<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-2">
    <div class="d-flex justify-content-between mb-3 align-items-center"><a href="menu.html" class="btn btn-secondary btn-sm">Geri</a><h5 class="m-0">Ürünlerim</h5><div></div></div>
    <div class="card p-3 mb-3 shadow-sm">
        <input type="text" id="ad" class="form-control mb-2" placeholder="Ürün Adı">
        <input type="number" id="fiyat" class="form-control mb-2" placeholder="Birim Fiyat">
        <button class="btn btn-primary w-100 fw-bold" onclick="kaydet()">KAYDET</button>
    </div>
    <div id="liste" class="list-group"></div>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        const baseApi = "https://waybill.bsite.net/api";
        async function yukle() {
            const res = await fetch(`${baseApi}/Urunler/${user.id || user.Id}`);
            const data = await res.json();
            const div = document.getElementById('liste'); div.innerHTML = "";
            data.forEach(u => {
                div.innerHTML += `<div class="list-group-item"><strong>${u.urunAdi || u.UrunAdi}</strong><br><span>${(u.birimFiyat || u.BirimFiyat).toFixed(2)} TL</span></div>`;
            });
        }
        async function kaydet() {
            await fetch(`${baseApi}/Urunler/ekle`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ kullaniciId: user.id || user.Id, urunAdi: document.getElementById('ad').value, birimFiyat: document.getElementById('fiyat').value, birim: "ADET" })
            });
            yukle();
        }
        yukle();
    </script>
</body>
</html>
