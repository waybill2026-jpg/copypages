<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürünler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-light p-3">
    <div class="d-flex justify-content-between mb-3"><a href="menu.html" class="btn btn-secondary">Geri</a><h4>Ürün Kataloğu</h4><div></div></div>
    <div class="card p-3 mb-3 shadow-sm">
        <input type="text" id="ad" class="form-control mb-2" placeholder="Ürün Adı">
        <div class="row g-2">
            <div class="col-6"><input type="number" id="fiyat" class="form-control" placeholder="Birim Fiyat"></div>
            <div class="col-6"><select id="birim" class="form-select"><option value="ADET">ADET</option><option value="TA">TA</option><option value="MT">MT</option></select></div>
        </div>
        <button class="btn btn-primary mt-2" onclick="kaydet()">ÜRÜNÜ KAYDET</button>
    </div>
    <div id="liste" class="list-group"></div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDRsM12xt29bDBMbQq0_nZlibqS7Rsnxws", authDomain: "ardmus2026.firebaseapp.com", projectId: "ardmus2026", storageBucket: "ardmus2026.firebasestorage.app", messagingSenderId: "530757931677", appId: "1:530757931677:web:228238a4f3b1b2fcad7a74" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        const user = JSON.parse(localStorage.getItem('user'));

        async function yukle() {
            const snapshot = await db.collection("Urunler").where("kullaniciId", "==", user.id).get();
            const div = document.getElementById('liste'); div.innerHTML = "";
            snapshot.forEach(doc => {
                const u = doc.data();
                div.innerHTML += `<div class="list-group-item d-flex justify-content-between">
                    <span><strong>${u.urunAdi}</strong> - ${u.birimFiyat} TL</span>
                    <button class="btn btn-sm btn-link text-danger" onclick="sil('${doc.id}')">Sil</button>
                </div>`;
            });
        }
        async function kaydet() {
            await db.collection("Urunler").add({ kullaniciId: user.id, urunAdi: document.getElementById('ad').value, birimFiyat: document.getElementById('fiyat').value, birim: document.getElementById('birim').value });
            location.reload();
        }
        async function sil(id) { if(confirm("Silinsin mi?")) { await db.collection("Urunler").doc(id).delete(); yukle(); } }
        yukle();
    </script>
</body>
</html>
