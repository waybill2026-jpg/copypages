<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İmza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { background: #2c3e50; padding: 10px; color: white; }
        .kagit { background: white; color: #000; padding: 20px; width: 550px; margin: 0 auto; min-height: 600px; display: flex; flex-direction: column; }
        .mavi-tablo { width: 100%; border-collapse: collapse; border: 1px solid #3b6ebb; font-size: 11px; }
        .mavi-tablo th, .mavi-tablo td { border: 1px solid #3b6ebb; padding: 4px; text-align: center; }
        .imza-img { max-height: 60px; }
        .sig-canvas { border: 2px dashed #3b6ebb; width: 100%; height: 250px; background: white; touch-action: none; }
    </style>
</head>
<body>
    <div class="kagit shadow" id="yazdirmaAlani">
        <div style="text-align:center; font-weight:bold; font-size:20px; color:#3b6ebb; border-bottom:2px solid #3b6ebb;">İRSALİYE</div>
        <div class="d-flex justify-content-between small fw-bold mt-2">
            <div>No: <span id="irsNo" style="color:red">...</span></div>
            <div>Tarih: <span id="irsTarih">...</span></div>
        </div>
        <div class="mt-2 small"><strong>Müşteri:</strong> <span id="irsMusteri">...</span></div>
        <table class="mavi-tablo mt-2">
            <thead><tr style="background:#f0f8ff"><th>No</th><th>Ürün</th><th>Mik</th><th>Tutar</th></tr></thead>
            <tbody id="irsGovde"></tbody>
            <tfoot><tr><th colspan="3" style="text-align:right">TOTAL</th><th id="irsToplam">0.00</th></tr></tfoot>
        </table>
        <div class="row mt-4 text-center small" style="color:#3b6ebb">
            <div class="col-6"><strong>Teslim Eden</strong><div id="boxEden" style="height:60px"></div><div id="txtEden" style="border-top:1px solid #3b6ebb; color:black">...</div></div>
            <div class="col-6"><strong>Teslim Alan</strong><div id="boxAlan" style="height:60px"></div><div id="txtAlan" style="border-top:1px solid #3b6ebb; color:black">...</div></div>
        </div>
    </div>
    <div class="mt-3 bg-light p-2 rounded text-dark shadow">
        <input type="text" id="alanAd" class="form-control form-control-sm mb-2" placeholder="Teslim Alan Adı">
        <div class="row g-1">
            <div class="col-6"><button class="btn btn-primary btn-sm w-100" onclick="imzaAc('Eden')">EDEN İMZA</button></div>
            <div class="col-6"><button class="btn btn-warning btn-sm w-100" onclick="imzaAc('Alan')">ALAN İMZA</button></div>
        </div>
        <button class="btn btn-success w-100 mt-2 py-3 fw-bold" onclick="paylas()">KAYDET VE PAYLAŞ</button>
    </div>
    <div class="modal fade" id="imzaModal" tabindex="-1"><div class="modal-dialog modal-fullscreen"><div class="modal-content">
        <div class="modal-body bg-light"><canvas id="sig-pad" class="sig-canvas"></canvas></div>
        <div class="modal-footer justify-content-between"><button class="btn btn-danger" onclick="pad.clear()">Sil</button><button class="btn btn-success px-5" onclick="tamam()">TAMAM</button></div>
    </div></div></div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDRsM12xt29bDBMbQq0_nZlibqS7Rsnxws", authDomain: "ardmus2026.firebaseapp.com", projectId: "ardmus2026", storageBucket: "ardmus2026.firebasestorage.app", messagingSenderId: "530757931677", appId: "1:530757931677:web:228238a4f3b1b2fcad7a74" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        const urlParams = new URLSearchParams(window.location.search); const irsId = urlParams.get('id');
        let pad, aktif = "", dEden = "", dAlan = "";

        async function yukle() {
            const doc = await db.collection("Irsaliyeler").doc(irsId).get();
            const b = doc.data();
            document.getElementById('irsNo').innerText = doc.id.substring(0,6).toUpperCase();
            document.getElementById('irsTarih').innerText = new Date(b.tarih).toLocaleDateString();
            document.getElementById('irsMusteri').innerText = b.musteriAdi;
            document.getElementById('irsToplam').innerText = b.toplamTutar;
            document.getElementById('txtEden').innerText = b.teslimEden;
            b.satirlar.forEach((x, i) => { document.getElementById('irsGovde').innerHTML += `<tr><td>${i+1}</td><td>${x.urunAdi}</td><td>${x.miktar}</td><td>${x.tutar}</td></tr>`; });
        }
        function imzaAc(t) {
            aktif = t; new bootstrap.Modal(document.getElementById('imzaModal')).show();
            const c = document.getElementById('sig-pad'); pad = new SignaturePad(c);
        }
        function tamam() {
            const d = pad.toDataURL();
            if (aktif === 'Eden') { dEden = d; document.getElementById('boxEden').innerHTML = `<img src="${d}" class="imza-img">`; }
            else { dAlan = d; document.getElementById('boxAlan').innerHTML = `<img src="${d}" class="imza-img">`; document.getElementById('txtAlan').innerText = document.getElementById('alanAd').value; }
            bootstrap.Modal.getInstance(document.getElementById('imzaModal')).hide();
        }
        async function paylas() {
            await db.collection("Irsaliyeler").doc(irsId).update({ imzaEden: dEden, imzaAlan: dAlan, teslimAlan: document.getElementById('alanAd').value });
            html2canvas(document.getElementById('yazdirmaAlani')).then(async c => {
                const f = new File([await (await fetch(c.toDataURL("image/jpeg"))).blob()], `Irsaliye.jpg`, { type: 'image/jpeg' });
                if (navigator.share) navigator.share({ files: [f] }); else alert("Kaydedildi!");
            });
        }
        yukle();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
