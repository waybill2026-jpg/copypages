<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İmza ve Onay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { background: #2c3e50; padding: 10px; color: white; }
        .irsaliye-kagit { background: white; color: #000; padding: 25px; width: 580px; min-height: 650px; margin: 0 auto; font-family: 'Times New Roman', serif; display: flex; flex-direction: column; justify-content: space-between; }
        .mavi-tablo { width: 100%; border-collapse: collapse; border: 1px solid #3b6ebb; }
        .mavi-tablo th, .mavi-tablo td { border: 1px solid #3b6ebb; padding: 5px; text-align: center; font-size: 12px; font-weight: bold; }
        .preview-container { overflow-x: auto; margin-bottom: 15px; }
        .imza-img { max-height: 60px; max-width: 100%; }
        .sig-canvas { border: 2px dashed #3b6ebb; width: 100%; height: 350px; background: white; touch-action: none; }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="irsaliye-kagit" id="yazdirmaAlani">
            <div style="text-align:center; font-weight:bold; font-size:24px; color:#3b6ebb; border-bottom:2px solid #3b6ebb; margin-bottom:10px;">İRSALİYE</div>
            <div class="d-flex justify-content-between small fw-bold">
                <div>No: <span id="irsNo" style="color:red">...</span></div>
                <div>Tarih: <span id="irsTarih">...</span></div>
            </div>
            <div class="mt-2 small"><strong>Müşteri:</strong> <span id="irsMusteri" style="border-bottom:1px solid #3b6ebb; display:inline-block; width:75%"></span></div>
            <table class="mavi-tablo mt-2">
                <thead><tr style="background:#f0f8ff; color:#3b6ebb"><th>No</th><th>Ürün</th><th>Mik</th><th>Birim</th><th>Tutar</th></tr></thead>
                <tbody id="irsGovde"></tbody>
                <tfoot><tr><th colspan="4" style="text-align:right">TOTAL:</th><th id="irsToplam">0.00</th></tr></tfoot>
            </table>
            <div class="row mt-4 text-center small" style="color:#3b6ebb">
                <div class="col-6"><strong>Teslim Eden</strong><div id="boxEden" style="height:65px"></div><div id="txtEden" style="border-top:1px solid #3b6ebb; color:black">...</div></div>
                <div class="col-6"><strong>Teslim Alan</strong><div id="boxAlan" style="height:65px"></div><div id="txtAlan" style="border-top:1px solid #3b6ebb; color:black">...</div></div>
            </div>
        </div>
    </div>

    <div class="bg-white p-2 rounded text-dark shadow">
        <input type="text" id="alanAd" class="form-control form-control-sm mb-2" placeholder="Teslim Alan Adı">
        <div class="row g-2">
            <div class="col-6"><button class="btn btn-primary btn-sm w-100 fw-bold" onclick="imzaAc('Eden')">EDEN İMZA</button></div>
            <div class="col-6"><button class="btn btn-warning btn-sm w-100 fw-bold" onclick="imzaAc('Alan')">ALAN İMZA</button></div>
        </div>
        <button class="btn btn-success w-100 fw-bold mt-2 py-3" onclick="paylas()">KAYDET VE PAYLAŞ</button>
    </div>

    <div class="modal fade" id="imzaModal" tabindex="-1">
        <div class="modal-dialog modal-fullscreen"><div class="modal-content"><div class="modal-header"><h5>İmza Alanı</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body bg-light"><canvas id="sig-pad" class="sig-canvas"></canvas></div><div class="modal-footer justify-content-between"><button class="btn btn-danger" onclick="pad.clear()">Sil</button><button class="btn btn-success px-5" onclick="tamam()">TAMAM</button></div></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search); const irsId = urlParams.get('id');
        const baseApi = "https://waybill.bsite.net/api";
        let pad, aktif = "", dEden = "", dAlan = "";

        async function yukle() {
            const res = await fetch(`${baseApi}/Irsaliye/detay/${irsId}`); const d = await res.json();
            const b = d.baslik || d.Baslik; const s = d.satirlar || d.Satirlar;
            document.getElementById('irsNo').innerText = (b.id || b.Id).toString().padStart(7,'0');
            document.getElementById('irsTarih').innerText = new Date(b.tarih || b.Tarih).toLocaleDateString('tr-TR');
            document.getElementById('irsMusteri').innerText = b.musteriAdi || b.MusteriAdi;
            document.getElementById('irsToplam').innerText = (b.toplamTutar || b.ToplamTutar).toFixed(2);
            document.getElementById('txtEden').innerText = b.teslimEden || b.TeslimEden;
            s.forEach((x, i) => { document.getElementById('irsGovde').innerHTML += `<tr><td>${i+1}</td><td>${x.urunAdi || x.UrunAdi}</td><td>${x.miktar || x.Miktar}</td><td>${x.birim || x.Birim || 'TA'}</td><td>${x.tutar || x.Tutar}</td></tr>`; });
            for(let i=s.length; i<12; i++) document.getElementById('irsGovde').innerHTML += `<tr><td>${i+1}</td><td></td><td></td><td></td><td></td></tr>`;
        }

        function imzaAc(t) {
            aktif = t; const m = new bootstrap.Modal(document.getElementById('imzaModal')); m.show();
            document.getElementById('imzaModal').addEventListener('shown.bs.modal', () => {
                const c = document.getElementById('sig-pad'); const r = Math.max(window.devicePixelRatio || 1, 1);
                c.width = c.offsetWidth * r; c.height = c.offsetHeight * r;
                c.getContext("2d").scale(r, r);
                pad = new SignaturePad(c); pad.clear();
            }, { once: true });
        }

        function tamam() {
            const data = pad.toDataURL();
            if(aktif === 'Eden') { dEden = data; document.getElementById('boxEden').innerHTML = `<img src="${data}" class="imza-img">`; }
            else { dAlan = data; document.getElementById('boxAlan').innerHTML = `<img src="${data}" class="imza-img">`; document.getElementById('txtAlan').innerText = document.getElementById('alanAd').value; }
            bootstrap.Modal.getInstance(document.getElementById('imzaModal')).hide();
        }

        async function paylas() {
            await fetch(`${baseApi}/Irsaliye/imza-kaydet`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ id:parseInt(irsId), imzaEden:dEden, imzaAlan:dAlan, teslimAlan:document.getElementById('alanAd').value }) });
            html2canvas(document.getElementById('yazdirmaAlani'), { scale: 2 }).then(async c => {
                const b = await (await fetch(c.toDataURL("image/jpeg"))).blob();
                const f = new File([b], `Irsaliye_${irsId}.jpg`, { type: 'image/jpeg' });
                if(navigator.share) navigator.share({ files: [f] }); else alert("Paylaşıldı.");
            });
        }
        yukle();
    </script>
</body>
</html>
