<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardmus 2026 - Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #2c3e50; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .login-card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .lang-btn { cursor: pointer; opacity: 0.6; transition: 0.3s; font-size: 14px; font-weight: bold; }
        .lang-btn.active { opacity: 1; border-bottom: 2px solid #2c3e50; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="d-flex justify-content-center gap-3 mb-3">
            <span class="lang-btn" onclick="setLang('tr')" id="btn-tr">TR</span>
            <span class="lang-btn" onclick="setLang('ru')" id="btn-ru">RU</span>
            <span class="lang-btn" onclick="setLang('uz')" id="btn-uz">UZ</span>
            <span class="lang-btn" onclick="setLang('en')" id="btn-en">EN</span>
        </div>
        <div class="text-center fw-bold fs-4 mb-4" style="color:#2c3e50">ARDMUS 2026</div>
        <div id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold" data-i18n="email">E-Posta</label>
                <input type="email" id="email" class="form-control" placeholder="admin@ardmus.com">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold" data-i18n="pass">Şifre</label>
                <div class="input-group">
                    <input type="password" id="pass" class="form-control" placeholder="******">
                    <span class="input-group-text" onclick="togglePass()"><i id="eyeIcon" class="fa fa-eye text-muted"></i></span>
                </div>
            </div>
            <button class="btn btn-primary w-100 py-2 fw-bold" style="background:#2c3e50; border:none;" onclick="girisYap()" data-i18n="login">GİRİŞ YAP</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDRsM12xt29bDBMbQq0_nZlibqS7Rsnxws",
            authDomain: "ardmus2026.firebaseapp.com",
            projectId: "ardmus2026",
            storageBucket: "ardmus2026.firebasestorage.app",
            messagingSenderId: "530757931677",
            appId: "1:530757931677:web:228238a4f3b1b2fcad7a74"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const translations = {
            tr: { email: "E-Posta", pass: "Şifre", login: "GİRİŞ YAP", welcome: "Hoş Geldiniz", failed: "Giriş Başarısız!", err: "Sistem hatası!", phMail: "E-posta", phPass: "Şifre" },
            ru: { email: "E-mail", pass: "Пароль", login: "ВОЙТИ", welcome: "Добро пожаловать", failed: "Ошибка!", err: "Ошибка!", phMail: "E-mail", phPass: "Пароль" },
            uz: { email: "E-Pochta", pass: "Parol", login: "KIRISH", welcome: "Xush kelibsiz", failed: "Xato!", err: "Xato!", phMail: "E-mail", phPass: "Parol" },
            en: { email: "E-Mail", pass: "Password", login: "LOGIN", welcome: "Welcome", failed: "Failed!", err: "Error!", phMail: "E-mail", phPass: "Password" }
        };

        function setLang(lang) {
            localStorage.setItem('ardmus_lang', lang);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            const dict = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.innerText = dict[key];
            });
        }

        function togglePass() {
            const p = document.getElementById('pass');
            const i = document.getElementById('eyeIcon');
            p.type = p.type === "password" ? "text" : "password";
            i.classList.toggle("fa-eye-slash");
        }

        async function girisYap() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const dict = translations[localStorage.getItem('ardmus_lang') || 'tr'];

            try {
                const snapshot = await db.collection("Kullanicilar")
                    .where("eposta", "==", email)
                    .where("sifre", "==", pass)
                    .get();

                if (!snapshot.empty) {
                    const user = snapshot.docs[0].data();
                    user.id = snapshot.docs[0].id; // Firebase ID'sini al
                    localStorage.setItem('user', JSON.stringify(user));
                    alert(dict.welcome + ", " + user.adSoyad);
                    window.location.href = "menu.html";
                } else {
                    alert(dict.failed);
                }
            } catch (e) { alert(dict.err); }
        }
        setLang(localStorage.getItem('ardmus_lang') || 'tr');
    </script>
</body>
</html>
