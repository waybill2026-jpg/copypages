<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geçmiş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-light">
    <div class="bg-dark text-white p-2 d-flex justify-content-between align-items-center">
        <a href="menu.html" class="btn btn-sm btn-outline-light">Geri</a>
        <h6 class="m-0">GEÇMİŞ</h6>
        <div style="width:40px"></div>
    </div>
    <div class="container mt-3">
        <input type="text" id="ara" class="form-control mb-3" placeholder="Ara..." onkeyup="filter()">
        <div id="list"></div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDRsM12xt29bDBMbQq0_nZlibqS7Rsnxws", authDomain: "ardmus2026.firebaseapp.com", projectId: "ardmus2026", storageBucket: "ardmus2026.firebasestorage.app", messagingSenderId: "530757931677", appId: "1:530757931677:web:228238a4f3b1b2fcad7a74" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        const user = JSON.parse(localStorage.getItem('user'));

        async function yukle() {
            const snap = await db.collection("Irsaliyeler").where("kullaniciId", "==", user.id).get();
            const div = document.getElementById('list'); div.innerHTML = "";
            snap.forEach(doc => {
                const i = doc.data();
                div.innerHTML += `
                <div class="card p-2 mb-2 shadow-sm item" data-text="${i.musteriAdi}">
                    <div class="d-flex justify-content-between align-items-center">
                        <div onclick="location.href='imza.html?id=${doc.id}'" style="cursor:pointer">
                            <strong>${i.musteriAdi}</strong><br>
                            <small class="text-muted">${new Date(i.tarih).toLocaleDateString()} - ${i.toplamTutar} TL</small>
                        </div>
                        <button class="btn btn-sm btn-primary" onclick="location.href='imza.html?id=${doc.id}'"><i class="fa fa-eye"></i></button>
                    </div>
                </div>`;
            });
        }
        function filter() {
            const val = document.getElementById('ara').value.toLowerCase();
            document.querySelectorAll('.item').forEach(el => { el.style.display = el.getAttribute('data-text').toLowerCase().includes(val) ? 'block' : 'none'; });
        }
        yukle();
    </script>
</body>
</html>
