<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni İrsaliye</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>.kagit-box { background: white; border: 1px solid #3b6ebb; padding: 10px; font-size: 12px; }</style>
</head>
<body class="p-2">
    <div class="card p-2 mb-2 shadow-sm">
        <label class="small fw-bold">Müşteri Seçin:</label>
        <input list="mList" id="mInput" class="form-control form-control-sm border-primary" onchange="mSec()">
        <datalist id="mList"></datalist>
    </div>
    <div class="card p-2 mb-2 shadow-sm">
        <select id="uSec" class="form-select form-select-sm mb-2" onchange="uFiyat()"><option value="">-- Ürün Seçin --</option></select>
        <div class="row g-1">
            <div class="col-4"><input type="number" id="mik" class="form-control form-control-sm" placeholder="Mik"></div>
            <div class="col-4"><input type="number" id="fyt" class="form-control form-control-sm" placeholder="Fiyat"></div>
            <div class="col-4"><button class="btn btn-primary btn-sm w-100" onclick="ekle()">EKLE</button></div>
        </div>
    </div>
    <div class="kagit-box shadow-sm">
        <div class="text-center fw-bold border-bottom mb-2" style="color:#3b6ebb">İRSALİYE</div>
        <div id="yaziM">...</div>
        <table class="table table-sm table-bordered mt-2">
            <thead><tr><th>Ürün</th><th>Mik</th><th>Tutar</th></tr></thead>
            <tbody id="govde"></tbody>
        </table>
        <div class="text-end fw-bold">TOTAL: <span id="toplam">0.00</span></div>
    </div>
    <button class="btn btn-success w-100 mt-2 p-3 fw-bold" onclick="kaydet()">KAYDET VE İMZAYA GEÇ</button>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDRsM12xt29bDBMbQq0_nZlibqS7Rsnxws", authDomain: "ardmus2026.firebaseapp.com", projectId: "ardmus2026", storageBucket: "ardmus2026.firebasestorage.app", messagingSenderId: "530757931677", appId: "1:530757931677:web:228238a4f3b1b2fcad7a74" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        const user = JSON.parse(localStorage.getItem('user'));
        let products = []; let clients = []; let items = [];

        async function init() {
            const snapC = await db.collection("Musteriler").where("kullaniciId", "==", user.id).get();
            snapC.forEach(doc => { clients.push({id: doc.id, ...doc.data()}); document.getElementById('mList').innerHTML += `<option value="${doc.data().unvan}">`; });
            const snapU = await db.collection("Urunler").where("kullaniciId", "==", user.id).get();
            snapU.forEach(doc => { products.push({id: doc.id, ...doc.data()}); document.getElementById('uSec').innerHTML += `<option value="${doc.id}">${doc.data().urunAdi}</option>`; });
        }
        function mSec() { document.getElementById('yaziM').innerText = document.getElementById('mInput').value; }
        function uFiyat() {
            const u = products.find(x => x.id == document.getElementById('uSec').value);
            if (u) document.getElementById('fyt').value = u.birimFiyat;
        }
        function ekle() {
            const s = document.getElementById('uSec');
            const ad = s.options[s.selectedIndex].text;
            const m = document.getElementById('mik').value;
            const f = document.getElementById('fyt').value;
            items.push({ urunAdi: ad, miktar: m, fiyat: f, tutar: m * f });
            draw();
        }
        function draw() {
            const g = document.getElementById('govde'); g.innerHTML = ""; let t = 0;
            items.forEach(i => { t += i.tutar; g.innerHTML += `<tr><td>${i.urunAdi}</td><td>${i.miktar}</td><td>${i.tutar.toFixed(2)}</td></tr>`; });
            document.getElementById('toplam').innerText = t.toFixed(2);
        }
        async function kaydet() {
            const docRef = await db.collection("Irsaliyeler").add({
                kullaniciId: user.id,
                musteriAdi: document.getElementById('mInput').value,
                toplamTutar: document.getElementById('toplam').innerText,
                tarih: new Date().toISOString(),
                teslimEden: user.adSoyad,
                satirlar: items,
                imzaEden: "", imzaAlan: "", teslimAlan: ""
            });
            location.href = "imza.html?id=" + docRef.id;
        }
        init();
    </script>
</body>
</html>
