<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müşteriler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-light">
    <div class="bg-dark text-white p-2 d-flex justify-content-between align-items-center mb-3">
        <a href="menu.html" class="btn btn-sm btn-outline-light">Geri</a>
        <h6 class="m-0">MÜŞTERİ REHBERİ</h6>
        <button class="btn btn-sm btn-primary" onclick="modal.show()">+</button>
    </div>
    <div class="container"><div id="mList" class="list-group shadow-sm"></div></div>
    <div class="modal fade" id="mModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5>Yeni Müşteri</h5></div>
            <div class="modal-body">
                <input type="text" id="unvan" class="form-control mb-2" placeholder="Müşteri Adı">
                <input type="text" id="tel" class="form-control" placeholder="Telefon">
            </div>
            <div class="modal-footer"><button class="btn btn-success w-100" onclick="save()">KAYDET</button></div>
        </div></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDRsM12xt29bDBMbQq0_nZlibqS7Rsnxws", authDomain: "ardmus2026.firebaseapp.com", projectId: "ardmus2026", storageBucket: "ardmus2026.firebasestorage.app", messagingSenderId: "530757931677", appId: "1:530757931677:web:228238a4f3b1b2fcad7a74" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
        const user = JSON.parse(localStorage.getItem('user'));
        const modal = new bootstrap.Modal(document.getElementById('mModal'));

        async function yukle() {
            const snapshot = await db.collection("Musteriler").where("kullaniciId", "==", user.id).get();
            const div = document.getElementById('mList'); div.innerHTML = "";
            snapshot.forEach(doc => {
                const m = doc.data();
                div.innerHTML += `<div class="list-group-item d-flex justify-content-between align-items-center">
                    <div><strong>${m.unvan}</strong><br><small>${m.telefon || ''}</small></div>
                    <button class="btn btn-sm btn-outline-danger" onclick="sil('${doc.id}')">X</button>
                </div>`;
            });
        }
        async function save() {
            await db.collection("Musteriler").add({ kullaniciId: user.id, unvan: document.getElementById('unvan').value, telefon: document.getElementById('tel').value });
            modal.hide(); yukle();
        }
        async function sil(id) { if (confirm("Silinsin mi?")) { await db.collection("Musteriler").doc(id).delete(); yukle(); } }
        yukle();
    </script>
</body>
</html>
