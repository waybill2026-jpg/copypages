<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="bg-dark text-white p-2 d-flex justify-content-between align-items-center mb-3">
        <a href="menu.html" class="btn btn-sm btn-outline-light">Geri</a>
        <h6 class="m-0">MÜŞTERİ REHBERİ</h6>
        <button class="btn btn-sm btn-primary" onclick="modal.show()">+</button>
    </div>
    <div class="container"><div id="mList" class="list-group shadow-sm"></div></div>

    <div class="modal fade" id="mModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Yeni Müşteri</h5></div><div class="modal-body"><input type="text" id="unvan" class="form-control mb-2" placeholder="Müşteri Adı"><input type="text" id="tel" class="form-control" placeholder="Telefon"></div><div class="modal-footer"><button class="btn btn-success w-100" onclick="save()">KAYDET</button></div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        const modal = new bootstrap.Modal(document.getElementById('mModal'));
        const baseApi = "https://waybill.bsite.net/api";

        async function yukle() {
            const res = await fetch(`${baseApi}/Musteriler/${user.id || user.Id}`);
            const data = await res.json();
            const div = document.getElementById('mList'); div.innerHTML = "";
            data.forEach(m => {
                div.innerHTML += `<div class="list-group-item d-flex justify-content-between align-items-center"><div><strong>${m.unvan || m.Unvan}</strong><br><small>${m.telefon || m.Telefon || ''}</small></div><button class="btn btn-sm btn-outline-danger" onclick="sil(${m.id || m.Id})">Sil</button></div>`;
            });
        }
        async function save() {
            await fetch(`${baseApi}/Musteriler/ekle`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ kullaniciId: user.id || user.Id, unvan: document.getElementById('unvan').value, telefon: document.getElementById('tel').value })
            });
            modal.hide(); yukle();
        }
        async function sil(id) { if(confirm("Emin misin?")) { await fetch(`${baseApi}/Musteriler/sil/${id}`, {method:'DELETE'}); yukle(); } }
        yukle();
    </script>
</body>
</html>
