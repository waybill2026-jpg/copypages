<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardmus 2026 - Login</title>
    <link rel="manifest" href="manifest.json"><meta name="theme-color" content="#2c3e50">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #2c3e50; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .login-card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .lang-btn { cursor:pointer; opacity: 0.6; font-size: 14px; font-weight: bold; }
        .lang-btn.active { opacity: 1; border-bottom: 2px solid #2c3e50; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="d-flex justify-content-center gap-3 mb-3">
            <span class="lang-btn" onclick="setLang('tr')" id="btn-tr">TR</span>
            <span class="lang-btn" onclick="setLang('ru')" id="btn-ru">RU</span>
            <span class="lang-btn" onclick="setLang('uz')" id="btn-uz">UZ</span>
            <span class="lang-btn" onclick="setLang('en')" id="btn-en">EN</span>
        </div>
        <div class="text-center fw-bold fs-4 mb-4" style="color:#2c3e50">ARDMUS 2026</div>
        <div class="mb-3">
            <label class="form-label small fw-bold" data-i18n="email">E-Posta</label>
            <input type="email" id="email" class="form-control" placeholder="admin@ardmus.com">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold" data-i18n="pass">Şifre</label>
            <div class="input-group">
                <input type="password" id="pass" class="form-control" placeholder="******">
                <span class="input-group-text" onclick="togglePass()"><i id="eyeIcon" class="fa fa-eye"></i></span>
            </div>
        </div>
        <button class="btn btn-primary w-100 py-2 fw-bold" style="background:#2c3e50; border:none;" onclick="girisYap()" data-i18n="login">GİRİŞ YAP</button>
    </div>

    <script>
        const translations = {
            tr: { email:"E-Posta", pass:"Şifre", login:"GİRİŞ YAP", welcome:"Hoş Geldiniz" },
            ru: { email:"Почта", pass:"Пароль", login:"ВОЙТИ", welcome:"Добро пожаловать" },
            uz: { email:"E-Pochta", pass:"Parol", login:"KIRISH", welcome:"Xush kelibsiz" },
            en: { email:"E-Mail", pass:"Password", login:"LOGIN", welcome:"Welcome" }
        };

        function togglePass() {
            const p = document.getElementById('pass'); const i = document.getElementById('eyeIcon');
            if(p.type === "password") { p.type = "text"; i.classList.replace("fa-eye", "fa-eye-slash"); }
            else { p.type = "password"; i.classList.replace("fa-eye-slash", "fa-eye"); }
        }

        function setLang(l) {
            localStorage.setItem('ardmus_lang', l);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+l).classList.add('active');
            const d = translations[l];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = d[el.getAttribute('data-i18n')]; });
        }

        async function girisYap() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                const response = await fetch('https://waybill.bsite.net/api/Auth/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ eposta: email, sifre: pass })
                });
                if (response.ok) {
                    const user = await response.json();
                    localStorage.setItem('user', JSON.stringify(user));
                    window.location.href = "menu.html";
                } else { alert("Hata!"); }
            } catch (e) { alert("Sunucu hatası!"); }
        }
        setLang(localStorage.getItem('ardmus_lang') || 'tr');
    </script>
</body>
</html>
